<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects — StudioFlow</title>
  <style>
    body { font-family: monospace; max-width: 1100px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    nav { margin-bottom: 24px; }
    nav a { margin-right: 24px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    tr:hover td { background: #fafafa; cursor: pointer; }
    .actions { margin-bottom: 16px; }
    .btn { padding: 6px 16px; font-family: monospace; font-size: 0.9rem; cursor: pointer; }
    .empty { color: #999; padding: 16px 0; }
    .error { color: #721c24; background: #f8d7da; padding: 12px; border-radius: 4px; }
    /* Status badges */
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
    .s-active    { background: #e2e3e5; color: #383d41; }
    .s-pending   { background: #fff3cd; color: #856404; }
    .s-reviewed  { background: #d4edda; color: #155724; }
    /* Review pressure column */
    .rev-pending { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; background: #fff3cd; color: #856404; font-weight: bold; }
    .rev-done    { color: #155724; font-weight: bold; }
    .rev-none    { color: #aaa; }
    /* Amber left border on rows with pending review */
    tr.needs-action > td:first-child { border-left: 3px solid #f0ad4e; padding-left: 9px; }
  </style>
</head>
<body>
  <h1>Projects</h1>
  <p class="sub">Sherman + Associates — Internal Demo</p>

  <nav>
    <a href="/ui/">← Dashboard</a>
    <a href="/ui/projects/new">+ New Project</a>
    <a href="/ui/reviews">☰ Review Queue</a>
  </nav>

  <div class="actions">
    <button class="btn" onclick="load()">Refresh</button>
  </div>

  <div id="error"></div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>Status</th>
        <th>Client</th>
        <th>Address</th>
        <th>Type</th>
        <th>Reviews</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <p id="empty" class="empty" style="display:none">No projects yet. <a href="/ui/projects/new">Create one.</a></p>

  <script>
    function statusBadge(status) {
      const map = {
        'active':         ['s-active',   'Active'],
        'pending_review': ['s-pending',  'Review Required'],
        'reviewed':       ['s-reviewed', 'Reviewed'],
      };
      const [cls, label] = map[status] || ['s-active', status];
      return `<span class="status-badge ${cls}">${label}</span>`;
    }

    function reviewCell(core) {
      if (!core) return '<span class="rev-none">—</span>';
      if (core.pending_review_count > 0) {
        return `<span class="rev-pending">${core.pending_review_count} pending</span>`;
      }
      if (core.review_count > 0) {
        return '<span class="rev-done">&#10003;</span>';
      }
      return '<span class="rev-none">—</span>';
    }

    function load() {
      document.getElementById('error').innerHTML = '';
      fetch('/projects')
        .then(r => r.json())
        .then(d => {
          const projects = d.projects;
          const tbody = document.getElementById('tbody');
          tbody.innerHTML = '';
          if (projects.length === 0) {
            document.getElementById('table').style.display = 'none';
            document.getElementById('empty').style.display = '';
          } else {
            document.getElementById('empty').style.display = 'none';
            document.getElementById('table').style.display = '';
            projects.forEach(p => {
              const tr = document.createElement('tr');
              if (p.core && p.core.review_required) tr.classList.add('needs-action');
              tr.innerHTML = `
                <td>${statusBadge(p.core ? p.core.status : 'active')}</td>
                <td>${p.client_name}</td>
                <td>${p.property_address}</td>
                <td>${p.project_type}</td>
                <td>${reviewCell(p.core)}</td>
                <td>${p.created_at.replace('T', ' ').substring(0, 19)} UTC</td>
              `;
              tr.onclick = () => { window.location = '/ui/projects/' + p.project_id; };
              tbody.appendChild(tr);
            });
          }
        })
        .catch(e => {
          document.getElementById('error').innerHTML = '<div class="error">Failed to load projects: ' + e + '</div>';
        });
    }
    load();
  </script>
</body>
</html>
