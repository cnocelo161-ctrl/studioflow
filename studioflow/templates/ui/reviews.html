<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudioFlow — Review Queue</title>
  <style>
    body { font-family: monospace; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.2rem; }
    nav { margin-bottom: 20px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 16px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
    th { background: #f8f9fa; font-size: 0.8rem; }
    .state-pending  { color: #856404; font-weight: bold; }
    .state-approved { color: #155724; font-weight: bold; }
    .state-rejected { color: #721c24; font-weight: bold; }
    .error-box { color: #721c24; background: #f8d7da; padding: 10px; margin: 12px 0; white-space: pre-wrap; }
    button { font-family: monospace; font-size: 0.8rem; padding: 4px 10px; cursor: pointer; margin-right: 4px; }
    #refresh-btn { margin-bottom: 4px; }
    .empty { color: #666; padding: 16px 0; }
  </style>
</head>
<body>
  <nav><a href="/ui/">← Dashboard</a> &nbsp;|&nbsp; <a href="/ui/workflow">Run Workflow</a></nav>
  <h1>Review Queue</h1>

  <button id="refresh-btn" onclick="loadReviews()">Refresh</button>
  <div id="global-error"></div>

  <table>
    <thead>
      <tr>
        <th>Review ID</th>
        <th>Action</th>
        <th>Project</th>
        <th>State</th>
        <th>Submitted</th>
        <th>Decided</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    function setGlobalError(msg) {
      document.getElementById('global-error').innerHTML =
        msg ? `<div class="error-box">${msg}</div>` : '';
    }

    function fmt(iso) {
      return iso ? iso.replace('T', ' ').substring(0, 19) + ' UTC' : '—';
    }

    function renderRow(r) {
      const shortId = r.review_id.substring(0, 8) + '…';
      const stateClass = 'state-' + r.state;
      const projectId = r.result && r.result.project_id ? r.result.project_id : null;
      const projectCell = projectId
        ? `<a href="/ui/projects/${projectId}">${projectId.substring(0, 8)}…</a>`
        : '—';
      let actions = '';
      if (r.state === 'pending') {
        actions = `
          <button onclick="approve('${r.review_id}')">Approve</button>
          <button onclick="rejectRecord('${r.review_id}')">Reject</button>
        `;
      }
      return `
        <tr id="row-${r.review_id}">
          <td title="${r.review_id}">${shortId}</td>
          <td>${r.action}</td>
          <td>${projectCell}</td>
          <td class="${stateClass}">${r.state}</td>
          <td>${fmt(r.submitted_at)}</td>
          <td>${fmt(r.decided_at)}</td>
          <td>${actions}</td>
        </tr>
      `;
    }

    function loadReviews() {
      setGlobalError('');
      fetch('/reviews')
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status === 200) {
            const tbody = document.getElementById('rows');
            tbody.innerHTML = data.reviews.length === 0
              ? '<tr><td colspan="7" class="empty">No reviews yet.</td></tr>'
              : data.reviews.map(renderRow).join('');
          } else {
            setGlobalError(`Error ${status}: ${data.detail || JSON.stringify(data)}`);
          }
        })
        .catch(() => setGlobalError('Could not reach backend.'));
    }

    function approve(reviewId) {
      setGlobalError('');
      fetch(`/review/${reviewId}/approve`, { method: 'POST' })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status === 200) {
            document.getElementById(`row-${reviewId}`).outerHTML = renderRow(data);
          } else {
            setGlobalError(`Error ${status}: ${data.detail || JSON.stringify(data)}`);
          }
        })
        .catch(() => setGlobalError('Could not reach backend.'));
    }

    function rejectRecord(reviewId) {
      const reason = prompt('Rejection reason (optional — press OK to leave blank):');
      if (reason === null) return;  // operator cancelled prompt
      setGlobalError('');
      fetch(`/review/${reviewId}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason.trim() || null })
      })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status === 200) {
            document.getElementById(`row-${reviewId}`).outerHTML = renderRow(data);
          } else {
            setGlobalError(`Error ${status}: ${data.detail || JSON.stringify(data)}`);
          }
        })
        .catch(() => setGlobalError('Could not reach backend.'));
    }

    loadReviews();
  </script>
</body>
</html>
