<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project — StudioFlow</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    h2 { font-size: 1rem; margin-top: 32px; margin-bottom: 8px; }
    .sub { color: #666; font-size: 0.85rem; margin-bottom: 10px; }
    nav { margin-bottom: 20px; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    .meta-grid { display: grid; grid-template-columns: 160px 1fr; gap: 6px 16px; margin-bottom: 8px; font-size: 0.9rem; }
    .meta-label { color: #555; }
    details { margin-top: 8px; }
    summary { cursor: pointer; font-size: 0.9rem; color: #333; padding: 4px 0; }
    pre { background: #f8f9fa; border: 1px solid #dee2e6; padding: 14px;
          overflow: auto; max-height: 400px; font-size: 0.75rem; margin-top: 8px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .pending  { background: #fff3cd; color: #856404; }
    .approved { background: #d4edda; color: #155724; }
    .rejected { background: #f8d7da; color: #721c24; }
    .btn { padding: 4px 12px; font-family: monospace; font-size: 0.85rem; cursor: pointer; margin-right: 6px; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .error { color: #721c24; background: #f8d7da; padding: 10px; margin-top: 12px; }
    .confirm { color: #155724; margin-top: 8px; }
    .empty { color: #999; }
    #loading { color: #999; }
    /* Core state — status badges */
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    .s-active    { background: #e2e3e5; color: #383d41; }
    .s-pending   { background: #fff3cd; color: #856404; }
    .s-reviewed  { background: #d4edda; color: #155724; }
    /* Core state — status strip */
    #status-strip { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
    #next-action-el { font-size: 0.9rem; color: #444; }
    #last-activity-el { font-size: 0.8rem; color: #666; margin-bottom: 20px; }
    /* Core state — action required banner */
    .action-banner { border-left: 4px solid #f0ad4e; background: #fffbf0; padding: 10px 14px; margin-bottom: 20px; font-size: 0.9rem; }
    /* Review count label in h2 */
    #review-count-label { font-weight: normal; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav><a href="/ui/">← Dashboard</a> &nbsp;|&nbsp; <a href="/ui/projects">Projects</a></nav>

  <div id="loading">Loading project…</div>
  <div id="content" style="display:none">
    <h1 id="title"></h1>
    <p class="sub" id="subtitle"></p>

    <div id="status-strip">
      <span id="status-badge-el"></span>
      <span id="next-action-el"></span>
    </div>
    <p id="last-activity-el"></p>

    <h2>Details</h2>
    <div class="meta-grid" id="meta"></div>

    <details>
      <summary>Workflow Output (JSON)</summary>
      <pre id="workflow-output"></pre>
    </details>

    <div id="action-banner" class="action-banner" style="display:none">
      <strong>Action Required</strong> — <span id="action-text-el"></span>
    </div>

    <h2>Reviews <span id="review-count-label"></span></h2>
    <div id="review-error"></div>
    <div id="review-confirm"></div>
    <table id="review-table" style="display:none">
      <thead>
        <tr><th>Review ID</th><th>Action</th><th>State</th><th>Submitted</th><th>Actions</th></tr>
      </thead>
      <tbody id="review-tbody"></tbody>
    </table>
    <p id="review-empty" class="empty" style="display:none">No reviews yet.</p>
  </div>
  <div id="page-error" class="error" style="display:none"></div>

  <script>
    const projectId = {{ project_id | tojson }};

    function renderReviews(reviews) {
      document.getElementById('review-error').innerHTML = '';
      document.getElementById('review-confirm').innerHTML = '';
      const tbody = document.getElementById('review-tbody');
      tbody.innerHTML = '';
      if (reviews.length === 0) {
        document.getElementById('review-table').style.display = 'none';
        document.getElementById('review-empty').style.display = '';
      } else {
        document.getElementById('review-empty').style.display = 'none';
        document.getElementById('review-table').style.display = '';
        reviews.forEach(r => {
          const tr = document.createElement('tr');
          const canDecide = r.state === 'pending';
          tr.innerHTML = `
            <td style="font-size:0.75rem">${r.review_id}</td>
            <td>${r.action}</td>
            <td><span class="badge ${r.state}">${r.state}</span></td>
            <td>${r.submitted_at.replace('T', ' ').substring(0, 19)} UTC</td>
            <td>
              <button class="btn" onclick="approve('${r.review_id}')" ${canDecide ? '' : 'disabled'}>Approve</button>
              <button class="btn" onclick="reject('${r.review_id}')"  ${canDecide ? '' : 'disabled'}>Reject</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    function renderCoreState(core) {
      const statusMap = {
        'active':         ['s-active',   'Active'],
        'pending_review': ['s-pending',  'Review Required'],
        'reviewed':       ['s-reviewed', 'Reviewed'],
      };
      const [cls, label] = statusMap[core.status] || ['s-active', core.status];
      document.getElementById('status-badge-el').innerHTML =
        `<span class="status-badge ${cls}">${label}</span>`;
      document.getElementById('next-action-el').textContent = core.next_action;
      document.getElementById('last-activity-el').textContent =
        'Last activity: ' + core.last_activity_at.replace('T', ' ').substring(0, 19) + ' UTC';

      const banner = document.getElementById('action-banner');
      if (core.review_required) {
        document.getElementById('action-text-el').textContent = core.next_action;
        banner.style.display = '';
      } else {
        banner.style.display = 'none';
      }

      const countLabel = document.getElementById('review-count-label');
      if (core.pending_review_count > 0) {
        countLabel.textContent = '(' + core.pending_review_count + ' pending)';
        countLabel.style.color = '#856404';
      } else if (core.review_count > 0) {
        countLabel.textContent = '(' + core.review_count + ' total)';
        countLabel.style.color = '#555';
      } else {
        countLabel.textContent = '';
      }
    }

    function load() {
      fetch('/projects/' + projectId)
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status !== 200) {
            document.getElementById('loading').style.display = 'none';
            const el = document.getElementById('page-error');
            el.textContent = `Error ${status}: ${data.detail || JSON.stringify(data)}`;
            el.style.display = '';
            return;
          }
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = '';

          document.getElementById('title').textContent = data.client_name;
          document.getElementById('subtitle').textContent = data.property_address;
          document.getElementById('meta').innerHTML = `
            <span class="meta-label">Project ID</span><span>${data.project_id}</span>
            <span class="meta-label">Project Type</span><span>${data.project_type}</span>
            <span class="meta-label">Created</span><span>${data.created_at.replace('T', ' ').substring(0, 19)} UTC</span>
            <span class="meta-label">Last Activity</span><span>${data.core.last_activity_at.replace('T', ' ').substring(0, 19)} UTC</span>
          `;
          document.getElementById('workflow-output').textContent =
            JSON.stringify(data.workflow_output, null, 2);
          renderCoreState(data.core);
          renderReviews(data.reviews);
        })
        .catch(e => {
          document.getElementById('loading').style.display = 'none';
          const el = document.getElementById('page-error');
          el.textContent = 'Failed to load project: ' + e;
          el.style.display = '';
        });
    }

    function approve(reviewId) {
      document.getElementById('review-error').innerHTML = '';
      fetch('/review/' + reviewId + '/approve', { method: 'POST' })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status === 200) {
            document.getElementById('review-confirm').innerHTML =
              '<p class="confirm">Approved.</p>';
            load();
          } else {
            document.getElementById('review-error').innerHTML =
              `<div class="error">Error ${status}: ${data.detail || JSON.stringify(data)}</div>`;
          }
        })
        .catch(() => {
          document.getElementById('review-error').innerHTML =
            '<div class="error">Could not reach backend.</div>';
        });
    }

    function reject(reviewId) {
      document.getElementById('review-error').innerHTML = '';
      fetch('/review/' + reviewId + '/reject', { method: 'POST' })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (status === 200) {
            document.getElementById('review-confirm').innerHTML =
              '<p class="confirm">Rejected.</p>';
            load();
          } else {
            document.getElementById('review-error').innerHTML =
              `<div class="error">Error ${status}: ${data.detail || JSON.stringify(data)}</div>`;
          }
        })
        .catch(() => {
          document.getElementById('review-error').innerHTML =
            '<div class="error">Could not reach backend.</div>';
        });
    }

    load();
  </script>
</body>
</html>
